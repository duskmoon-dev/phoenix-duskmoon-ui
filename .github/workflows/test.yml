      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.1

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            deps
          key: ${{ runner.os }}-${{ matrix.app }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.app }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-
