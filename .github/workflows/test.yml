  migrated-native-apps:
    name: ${{ matrix.app }} Tests (Elixir ${{matrix.elixir}} / OTP ${{matrix.otp}})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        elixir: ['1.18']
        otp: ['27', '28']
