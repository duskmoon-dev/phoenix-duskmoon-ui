name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 9.2.0)'
        required: true
        type: string
      git-ref:
        description: 'Git revision to release (branch, tag, or commit)'
        required: true
        default: 'main'
        type: string

env:
  ELIXIR_VERSION: '1.18'
  OTP_VERSION: '28'
  MIX_ENV: 'prod'

permissions:
  contents: write
  packages: write
  id-token: write
  actions: write

jobs:
  release:
    name: Release v${{ inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git-ref }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Elixir dependencies
        run: mix deps.get

      # ── 1. Update version in all files ──────────────────────────────
      - name: Update version
        run: |
          VERSION="${{ inputs.version }}"
          echo "Releasing version: ${VERSION}"
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/phoenix_duskmoon/mix.exs
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/duskmoon_bundler/mix.exs
          sed -i "s%\"version\": \"[^\"]\+\"%\"version\": \"${VERSION}\"%" apps/phoenix_duskmoon/package.json
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" mix.exs

      - name: Install JavaScript dependencies and refresh Bun lockfile
        run: bun install --ignore-scripts --no-progress

      - name: Prepare package assets
        env:
          TAILWIND_PATH: ${{ github.workspace }}/node_modules/.bin/tailwindcss
        run: mix prepublish

      # ── 2. Publish packages ─────────────────────────────────────────
      - name: Publish phoenix_duskmoon to hex.pm
        working-directory: apps/phoenix_duskmoon
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: dev
        run: |
          mix deps.get
          mix hex.publish package --yes --replace

      - name: Publish duskmoon_bundler to hex.pm
        working-directory: apps/duskmoon_bundler
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: dev
        run: |
          mix deps.get
          mix hex.publish package --yes --replace

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION="${{ inputs.version }}"
          if echo "$VERSION" | grep -qE '[-]'; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        working-directory: apps/phoenix_duskmoon
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance --tag ${{ steps.npm-tag.outputs.tag }}

      # ── 3. Commit version bump, tag, and push ──────────────────────
      - name: Commit and tag
        run: |
          VERSION="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/phoenix_duskmoon/mix.exs apps/duskmoon_bundler/mix.exs apps/phoenix_duskmoon/package.json mix.exs bun.lock
          git commit -m "chore(version): bump to ${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:${{ inputs.git-ref }} --tags

      # ── 4. Create GitHub Release ────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          VERSION="${{ inputs.version }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release Summary

          **Version**: v${VERSION}

          ### Published:
          - [Hex.pm: phoenix_duskmoon](https://hex.pm/packages/phoenix_duskmoon/${VERSION})
          - [Hex.pm: duskmoon_bundler](https://hex.pm/packages/duskmoon_bundler/${VERSION})
          - [npm](https://www.npmjs.com/package/phoenix_duskmoon/v/${VERSION})
          - GitHub Release
          EOF

  trigger-docker:
    name: Trigger Docker Build
    runs-on: ubuntu-latest
    needs: [ release ]

    steps:
      - name: Trigger Docker workflow
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker.yml',
              ref: 'main',
              inputs: {
                'git-ref': 'v${{ inputs.version }}',
                'version': '${{ inputs.version }}'
              }
            });
            console.log('Docker build workflow triggered for v${{ inputs.version }}');
