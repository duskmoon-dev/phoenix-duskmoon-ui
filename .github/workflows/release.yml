name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 9.0.0)'
        required: true
        type: string
      git-ref:
        description: 'Git revision to release (branch, tag, or commit)'
        required: true
        default: 'main'
        type: string

env:
  ELIXIR_VERSION: '1.18'
  OTP_VERSION: '28'
  MIX_ENV: 'prod'
  TAILWIND_VERSION: '4.1.11'

permissions:
  contents: write
  packages: write
  id-token: write
  actions: write

jobs:
  publish:
    name: Publish to hex.pm and npm
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git-ref || github.ref }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip 'v' prefix from tag
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          mix deps.get
          if ! timeout 120 bun install; then
            echo "::warning::bun install timed out, falling back to npm install"
            npm install --ignore-scripts
          fi

      - name: Install Tailwind CLI
        run: |
          if ! timeout 60 bun add --dev tailwindcss@${{ env.TAILWIND_VERSION }}; then
            echo "::warning::bun add timed out, falling back to npm install"
            npm install --save-dev tailwindcss@${{ env.TAILWIND_VERSION }}
          fi

      - name: Set version and prepare package
        env:
          TAILWIND_PATH: ${{ github.workspace }}/node_modules/.bin/tailwindcss
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Releasing version: ${VERSION}"
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/phoenix_duskmoon/mix.exs
          sed -i "s%\"version\": \"[^\"]\+\"%\"version\": \"${VERSION}\"%" apps/phoenix_duskmoon/package.json
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" mix.exs
          mix prepublish

      - name: Publish to hex.pm
        working-directory: apps/phoenix_duskmoon
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: dev
        run: |
          mix deps.get
          mix hex.publish package --yes --replace

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for Trusted Publishers OIDC support
        run: npm install -g npm@latest

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if echo "$VERSION" | grep -qE '[-]'; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        working-directory: apps/phoenix_duskmoon
        run: |
          npm publish --access public --provenance --tag ${{ steps.npm-tag.outputs.tag }} || {
            echo "::warning::npm publish failed (version may already exist)"
          }

      - name: Create git tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = 'refs/tags/v${{ steps.version.outputs.version }}';
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: tag,
                sha: context.sha
              });
            } catch (e) {
              if (e.status === 422) {
                core.warning(`Tag ${tag} already exists`);
              } else {
                throw e;
              }
            }

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ publish ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git-ref || github.ref }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Phoenix Duskmoon UI v${{ steps.version.outputs.version }}

            ### Published Packages
            - **Hex**: [`phoenix_duskmoon` v${{ steps.version.outputs.version }}](https://hex.pm/packages/phoenix_duskmoon/${{ steps.version.outputs.version }})
            - **npm**: [`phoenix_duskmoon` v${{ steps.version.outputs.version }}](https://www.npmjs.com/package/phoenix_duskmoon/v/${{ steps.version.outputs.version }})

            ### Docker Images
            - `docker.io/gsmlg/duskmoon-storybook:v${{ steps.version.outputs.version }}`
            - `ghcr.io/duskmoon-dev/duskmoon-storybook:v${{ steps.version.outputs.version }}`

            ### Changes
            See commit history for detailed changes.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published:" >> $GITHUB_STEP_SUMMARY
          echo "- Hex.pm package" >> $GITHUB_STEP_SUMMARY
          echo "- npm package" >> $GITHUB_STEP_SUMMARY
          echo "- Docker images (DockerHub + GHCR)" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Release" >> $GITHUB_STEP_SUMMARY

  trigger-docker:
    name: Trigger Docker Build
    runs-on: ubuntu-latest
    needs: [ create-release ]

    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "git-ref=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "git-ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Docker workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker.yml',
              ref: 'main',
              inputs: {
                'git-ref': '${{ steps.version.outputs.git-ref }}',
                'version': '${{ steps.version.outputs.version }}'
              }
            });
            console.log('Docker build workflow triggered for v${{ steps.version.outputs.version }}');
