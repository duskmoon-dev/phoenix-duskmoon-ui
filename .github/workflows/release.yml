name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 9.2.0)'
        required: true
        type: string
      git-ref:
        description: 'Git revision to release (branch, tag, or commit)'
        required: true
        default: 'main'
        type: string

env:
  ELIXIR_VERSION: '1.18'
  OTP_VERSION: '28'
  MIX_ENV: 'prod'

permissions:
  contents: write
  packages: write
  id-token: write
  actions: write

jobs:
  release:
    name: Release v${{ inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git-ref }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Set up Node.js for install
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Elixir dependencies
        run: mix deps.get

      # ── 1. Update version in all files ──────────────────────────────
      - name: Update version
        run: |
          VERSION="${{ inputs.version }}"
          echo "Releasing version: ${VERSION}"
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/phoenix_duskmoon/mix.exs
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/duskmoon_bundler/mix.exs
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/duskmoon_npm/mix.exs
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/duskmoon_hex_solver/mix.exs
          sed -i "s%\"version\": \"[^\"]\+\"%\"version\": \"${VERSION}\"%" apps/phoenix_duskmoon/package.json
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" mix.exs
          sed -i "s%\"version\": \"[^\"]\+\"%\"version\": \"${VERSION}\"%" bun.lock

      - name: Install JavaScript dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --package-lock=false --registry=https://registry.npmjs.org/

      - name: Prepare package assets
        run: mix prepublish

      # ── 2. Publish packages ─────────────────────────────────────────
      - name: Prepare app mix.exs files for Hex publish
        run: |
          VERSION="${{ inputs.version }}"
          MIX_BACKUP_DIR="${RUNNER_TEMP}/app_mix_exs"
          mkdir -p "${MIX_BACKUP_DIR}"
          cp apps/duskmoon_hex_solver/mix.exs "${MIX_BACKUP_DIR}/duskmoon_hex_solver.mix.exs"
          cp apps/duskmoon_npm/mix.exs "${MIX_BACKUP_DIR}/duskmoon_npm.mix.exs"
          cp apps/duskmoon_bundler/mix.exs "${MIX_BACKUP_DIR}/duskmoon_bundler.mix.exs"
          cp apps/phoenix_duskmoon/mix.exs "${MIX_BACKUP_DIR}/phoenix_duskmoon.mix.exs"
          sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' apps/duskmoon_hex_solver/mix.exs
          sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' apps/duskmoon_npm/mix.exs
          sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' apps/duskmoon_bundler/mix.exs
          sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' apps/phoenix_duskmoon/mix.exs
          sed -i "s%{:duskmoon_hex_solver, in_umbrella: true}%{:duskmoon_hex_solver, \"~> ${VERSION}\"}%" apps/duskmoon_npm/mix.exs
          sed -i "s%{:duskmoon_npm, in_umbrella: true}%{:duskmoon_npm, \"~> ${VERSION}\"}%" apps/duskmoon_bundler/mix.exs
          grep -q "{:duskmoon_hex_solver, \"~> ${VERSION}\"}" apps/duskmoon_npm/mix.exs
          grep -q "{:duskmoon_npm, \"~> ${VERSION}\"}" apps/duskmoon_bundler/mix.exs
          echo "MIX_BACKUP_DIR=${MIX_BACKUP_DIR}" >> "$GITHUB_ENV"

      - name: Publish duskmoon_hex_solver to hex.pm
        working-directory: apps/duskmoon_hex_solver
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: mix hex.publish package --yes --replace

      - name: Fetch duskmoon_npm Hex dependencies
        working-directory: apps/duskmoon_npm
        run: mix deps.get

      - name: Publish duskmoon_npm to hex.pm
        working-directory: apps/duskmoon_npm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: mix hex.publish package --yes --replace

      - name: Fetch duskmoon_bundler Hex dependencies
        working-directory: apps/duskmoon_bundler
        run: mix deps.get

      - name: Publish duskmoon_bundler to hex.pm
        working-directory: apps/duskmoon_bundler
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: mix hex.publish package --yes --replace

      - name: Fetch phoenix_duskmoon Hex dependencies
        working-directory: apps/phoenix_duskmoon
        run: mix deps.get

      - name: Publish phoenix_duskmoon to hex.pm
        working-directory: apps/phoenix_duskmoon
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: mix hex.publish package --yes --replace

      - name: Restore local umbrella mix.exs files
        if: always()
        run: |
          if [ -n "${MIX_BACKUP_DIR:-}" ] && [ -d "${MIX_BACKUP_DIR}" ]; then
            cp "${MIX_BACKUP_DIR}/duskmoon_hex_solver.mix.exs" apps/duskmoon_hex_solver/mix.exs
            cp "${MIX_BACKUP_DIR}/duskmoon_npm.mix.exs" apps/duskmoon_npm/mix.exs
            cp "${MIX_BACKUP_DIR}/duskmoon_bundler.mix.exs" apps/duskmoon_bundler/mix.exs
            cp "${MIX_BACKUP_DIR}/phoenix_duskmoon.mix.exs" apps/phoenix_duskmoon/mix.exs
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION="${{ inputs.version }}"
          if echo "$VERSION" | grep -qE '[-]'; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        working-directory: apps/phoenix_duskmoon
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance --tag ${{ steps.npm-tag.outputs.tag }}

      # ── 3. Commit version bump, tag, and push ──────────────────────
      - name: Commit and tag
        run: |
          VERSION="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/phoenix_duskmoon/mix.exs apps/duskmoon_bundler/mix.exs apps/duskmoon_npm/mix.exs apps/duskmoon_hex_solver/mix.exs apps/phoenix_duskmoon/package.json mix.exs bun.lock
          git commit -m "chore(version): bump to ${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:${{ inputs.git-ref }} --tags

      # ── 4. Create GitHub Release ────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          VERSION="${{ inputs.version }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release Summary

          **Version**: v${VERSION}

          ### Published:
          - [Hex.pm: duskmoon_hex_solver](https://hex.pm/packages/duskmoon_hex_solver/${VERSION})
          - [Hex.pm: duskmoon_npm](https://hex.pm/packages/duskmoon_npm/${VERSION})
          - [Hex.pm: duskmoon_bundler](https://hex.pm/packages/duskmoon_bundler/${VERSION})
          - [Hex.pm: phoenix_duskmoon](https://hex.pm/packages/phoenix_duskmoon/${VERSION})
          - [npm](https://www.npmjs.com/package/phoenix_duskmoon/v/${VERSION})
          - GitHub Release
          EOF

  trigger-docker:
    name: Trigger Docker Build
    runs-on: ubuntu-latest
    needs: [ release ]

    steps:
      - name: Trigger Docker workflow
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker.yml',
              ref: 'main',
              inputs: {
                'git-ref': 'v${{ inputs.version }}',
                'version': '${{ inputs.version }}'
              }
            });
            console.log('Docker build workflow triggered for v${{ inputs.version }}');
