name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 9.2.0)'
        required: true
        type: string
      git-ref:
        description: 'Git revision to release (branch, tag, or commit)'
        required: true
        default: 'main'
        type: string

env:
  ELIXIR_VERSION: '1.18'
  OTP_VERSION: '28'
  MIX_ENV: 'prod'

permissions:
  contents: write
  packages: write
  id-token: write
  actions: write

jobs:
  prepare-release:
    name: Prepare v${{ inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git-ref }}

      - name: Update version
        run: |
          VERSION="${{ inputs.version }}"
          echo "Releasing version: ${VERSION}"
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/phoenix_duskmoon/mix.exs
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/duskmoon_bundler/mix.exs
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/duskmoon_quickbeam/mix.exs
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/duskmoon_oxc/mix.exs
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/duskmoon_oxide/mix.exs
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/duskmoon_vize/mix.exs
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/duskmoon_npm/mix.exs
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" apps/duskmoon_hex_solver/mix.exs
          sed -i "s%\"version\": \"[^\"]\+\"%\"version\": \"${VERSION}\"%" apps/phoenix_duskmoon/package.json
          sed -i "s%@version \"[^\"]\+\"%@version \"${VERSION}\"%" mix.exs
          sed -i "s%\"version\": \"[^\"]\+\"%\"version\": \"${VERSION}\"%" bun.lock

      - name: Commit and tag
        run: |
          VERSION="${{ inputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists; skipping version commit and tag creation"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/phoenix_duskmoon/mix.exs apps/duskmoon_bundler/mix.exs apps/duskmoon_quickbeam/mix.exs apps/duskmoon_oxc/mix.exs apps/duskmoon_oxide/mix.exs apps/duskmoon_vize/mix.exs apps/duskmoon_npm/mix.exs apps/duskmoon_hex_solver/mix.exs apps/phoenix_duskmoon/package.json mix.exs bun.lock
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore(version): bump to ${VERSION}"
          fi
          git tag "v${VERSION}"
          git push origin HEAD:${{ inputs.git-ref }} "refs/tags/v${VERSION}"

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists; skipping release creation"
            exit 0
          fi

          if echo "${VERSION}" | grep -qE '[-]'; then
            gh release create "v${VERSION}" --title "v${VERSION}" --draft --prerelease --generate-notes
          else
            gh release create "v${VERSION}" --title "v${VERSION}" --draft --generate-notes
          fi

  native-prebuild:
    name: Build Native Precompiled Artifacts
    needs: [ prepare-release ]
    uses: ./.github/workflows/native-prebuild.yml
    with:
      version: ${{ inputs.version }}
      git-ref: ${{ inputs.git-ref }}
    secrets: inherit

  publish:
    name: Publish v${{ inputs.version }}
    runs-on: ubuntu-latest
    needs: [ native-prebuild ]
    timeout-minutes: 45

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git-ref }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Set up Node.js for install
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Install JavaScript dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --package-lock=false --registry=https://registry.npmjs.org/

      - name: Prepare package assets
        env:
          DUSKMOON_BUILD_NATIVE_FROM_SOURCE: '1'
        run: mix prepublish

      - name: Generate native checksum files
        run: |
          set -euo pipefail

          (
            cd apps/duskmoon_oxc
            DUSKMOON_BUILD_NATIVE_FROM_SOURCE=1 mix compile --force
            mix rustler_precompiled.download OXC.Native --all --print
            mix rustler_precompiled.download OXC.Format.Native --all --print
            mix rustler_precompiled.download OXC.Lint.Native --all --print
          )

          (
            cd apps/duskmoon_oxide
            DUSKMOON_BUILD_NATIVE_FROM_SOURCE=1 mix compile --force
            mix rustler_precompiled.download Oxide.Native --all --print
          )

          (
            cd apps/duskmoon_vize
            DUSKMOON_BUILD_NATIVE_FROM_SOURCE=1 mix compile --force
            mix rustler_precompiled.download Vize.Native --all --print
          )

          (
            cd apps/duskmoon_quickbeam
            DUSKMOON_BUILD_NATIVE_FROM_SOURCE=1 mix compile --force
            mix zigler_precompiled.download QuickBEAM.Native --all --print
          )

      - name: Prepare app mix.exs files for Hex publish
        run: |
          VERSION="${{ inputs.version }}"
          MIX_BACKUP_DIR="${RUNNER_TEMP}/app_mix_exs"
          mkdir -p "${MIX_BACKUP_DIR}"
          cp apps/duskmoon_hex_solver/mix.exs "${MIX_BACKUP_DIR}/duskmoon_hex_solver.mix.exs"
          cp apps/duskmoon_npm/mix.exs "${MIX_BACKUP_DIR}/duskmoon_npm.mix.exs"
          cp apps/duskmoon_oxc/mix.exs "${MIX_BACKUP_DIR}/duskmoon_oxc.mix.exs"
          cp apps/duskmoon_vize/mix.exs "${MIX_BACKUP_DIR}/duskmoon_vize.mix.exs"
          cp apps/duskmoon_oxide/mix.exs "${MIX_BACKUP_DIR}/duskmoon_oxide.mix.exs"
          cp apps/duskmoon_quickbeam/mix.exs "${MIX_BACKUP_DIR}/duskmoon_quickbeam.mix.exs"
          cp apps/duskmoon_bundler/mix.exs "${MIX_BACKUP_DIR}/duskmoon_bundler.mix.exs"
          cp apps/phoenix_duskmoon/mix.exs "${MIX_BACKUP_DIR}/phoenix_duskmoon.mix.exs"
          sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' apps/duskmoon_hex_solver/mix.exs
          sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' apps/duskmoon_npm/mix.exs
          sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' apps/duskmoon_oxc/mix.exs
          sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' apps/duskmoon_vize/mix.exs
          sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' apps/duskmoon_oxide/mix.exs
          sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' apps/duskmoon_quickbeam/mix.exs
          sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' apps/duskmoon_bundler/mix.exs
          sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' apps/phoenix_duskmoon/mix.exs
          sed -i "s%{:duskmoon_hex_solver, in_umbrella: true}%{:duskmoon_hex_solver, \"~> ${VERSION}\"}%" apps/duskmoon_npm/mix.exs
          sed -i "s%{:duskmoon_oxc, in_umbrella: true}%{:duskmoon_oxc, \"~> ${VERSION}\"}%" apps/duskmoon_quickbeam/mix.exs
          sed -i "s%{:duskmoon_npm, in_umbrella: true}%{:duskmoon_npm, \"~> ${VERSION}\", optional: true}%" apps/duskmoon_quickbeam/mix.exs
          sed -i "s%{:duskmoon_oxc, in_umbrella: true}%{:duskmoon_oxc, \"~> ${VERSION}\"}%" apps/duskmoon_bundler/mix.exs
          sed -i "s%{:duskmoon_vize, in_umbrella: true}%{:duskmoon_vize, \"~> ${VERSION}\"}%" apps/duskmoon_bundler/mix.exs
          sed -i "s%{:duskmoon_oxide, in_umbrella: true}%{:duskmoon_oxide, \"~> ${VERSION}\"}%" apps/duskmoon_bundler/mix.exs
          sed -i "s%{:duskmoon_quickbeam, in_umbrella: true}%{:duskmoon_quickbeam, \"~> ${VERSION}\"}%" apps/duskmoon_bundler/mix.exs
          sed -i "s%{:duskmoon_npm, in_umbrella: true}%{:duskmoon_npm, \"~> ${VERSION}\"}%" apps/duskmoon_bundler/mix.exs
          sed -i "s%{:duskmoon_bundler, in_umbrella: true, only: :dev, runtime: false}%{:duskmoon_bundler, \"~> ${VERSION}\", only: :dev, runtime: false}%" apps/phoenix_duskmoon/mix.exs
          grep -q "{:duskmoon_hex_solver, \"~> ${VERSION}\"}" apps/duskmoon_npm/mix.exs
          grep -q "{:duskmoon_oxc, \"~> ${VERSION}\"}" apps/duskmoon_quickbeam/mix.exs
          grep -q "{:duskmoon_npm, \"~> ${VERSION}\", optional: true}" apps/duskmoon_quickbeam/mix.exs
          grep -q "{:duskmoon_oxc, \"~> ${VERSION}\"}" apps/duskmoon_bundler/mix.exs
          grep -q "{:duskmoon_vize, \"~> ${VERSION}\"}" apps/duskmoon_bundler/mix.exs
          grep -q "{:duskmoon_oxide, \"~> ${VERSION}\"}" apps/duskmoon_bundler/mix.exs
          grep -q "{:duskmoon_quickbeam, \"~> ${VERSION}\"}" apps/duskmoon_bundler/mix.exs
          grep -q "{:duskmoon_npm, \"~> ${VERSION}\"}" apps/duskmoon_bundler/mix.exs
          grep -q "{:duskmoon_bundler, \"~> ${VERSION}\", only: :dev, runtime: false}" apps/phoenix_duskmoon/mix.exs
          echo "MIX_BACKUP_DIR=${MIX_BACKUP_DIR}" >> "$GITHUB_ENV"

      - name: Publish duskmoon_hex_solver to hex.pm
        working-directory: apps/duskmoon_hex_solver
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: mix hex.publish package --yes --replace

      - name: Fetch duskmoon_npm Hex dependencies
        working-directory: apps/duskmoon_npm
        run: mix deps.get --only prod

      - name: Publish duskmoon_npm to hex.pm
        working-directory: apps/duskmoon_npm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: mix hex.publish package --yes --replace

      - name: Fetch duskmoon_oxc Hex dependencies
        working-directory: apps/duskmoon_oxc
        run: mix deps.get --only prod

      - name: Publish duskmoon_oxc to hex.pm
        working-directory: apps/duskmoon_oxc
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: mix hex.publish package --yes --replace

      - name: Fetch duskmoon_vize Hex dependencies
        working-directory: apps/duskmoon_vize
        run: mix deps.get --only prod

      - name: Publish duskmoon_vize to hex.pm
        working-directory: apps/duskmoon_vize
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: mix hex.publish package --yes --replace

      - name: Fetch duskmoon_oxide Hex dependencies
        working-directory: apps/duskmoon_oxide
        run: mix deps.get --only prod

      - name: Publish duskmoon_oxide to hex.pm
        working-directory: apps/duskmoon_oxide
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: mix hex.publish package --yes --replace

      - name: Fetch duskmoon_quickbeam Hex dependencies
        working-directory: apps/duskmoon_quickbeam
        run: mix deps.get --only prod

      - name: Publish duskmoon_quickbeam to hex.pm
        working-directory: apps/duskmoon_quickbeam
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: mix hex.publish package --yes --replace

      - name: Fetch duskmoon_bundler Hex dependencies
        working-directory: apps/duskmoon_bundler
        run: mix deps.get --only prod

      - name: Publish duskmoon_bundler to hex.pm
        working-directory: apps/duskmoon_bundler
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: mix hex.publish package --yes --replace

      - name: Fetch phoenix_duskmoon Hex dependencies
        working-directory: apps/phoenix_duskmoon
        run: mix deps.get --only prod

      - name: Publish phoenix_duskmoon to hex.pm
        working-directory: apps/phoenix_duskmoon
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          MIX_ENV: prod
        run: mix hex.publish package --yes --replace

      - name: Restore local umbrella mix.exs files
        if: always()
        run: |
          if [ -n "${MIX_BACKUP_DIR:-}" ] && [ -d "${MIX_BACKUP_DIR}" ]; then
            cp "${MIX_BACKUP_DIR}/duskmoon_hex_solver.mix.exs" apps/duskmoon_hex_solver/mix.exs
            cp "${MIX_BACKUP_DIR}/duskmoon_npm.mix.exs" apps/duskmoon_npm/mix.exs
            cp "${MIX_BACKUP_DIR}/duskmoon_oxc.mix.exs" apps/duskmoon_oxc/mix.exs
            cp "${MIX_BACKUP_DIR}/duskmoon_vize.mix.exs" apps/duskmoon_vize/mix.exs
            cp "${MIX_BACKUP_DIR}/duskmoon_oxide.mix.exs" apps/duskmoon_oxide/mix.exs
            cp "${MIX_BACKUP_DIR}/duskmoon_quickbeam.mix.exs" apps/duskmoon_quickbeam/mix.exs
            cp "${MIX_BACKUP_DIR}/duskmoon_bundler.mix.exs" apps/duskmoon_bundler/mix.exs
            cp "${MIX_BACKUP_DIR}/phoenix_duskmoon.mix.exs" apps/phoenix_duskmoon/mix.exs
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION="${{ inputs.version }}"
          if echo "$VERSION" | grep -qE '[-]'; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        working-directory: apps/phoenix_duskmoon
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance --tag ${{ steps.npm-tag.outputs.tag }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          VERSION="${{ inputs.version }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release Summary

          **Version**: v${VERSION}

          ### Published:
          - [Hex.pm: duskmoon_hex_solver](https://hex.pm/packages/duskmoon_hex_solver/${VERSION})
          - [Hex.pm: duskmoon_npm](https://hex.pm/packages/duskmoon_npm/${VERSION})
          - [Hex.pm: duskmoon_oxc](https://hex.pm/packages/duskmoon_oxc/${VERSION})
          - [Hex.pm: duskmoon_vize](https://hex.pm/packages/duskmoon_vize/${VERSION})
          - [Hex.pm: duskmoon_oxide](https://hex.pm/packages/duskmoon_oxide/${VERSION})
          - [Hex.pm: duskmoon_quickbeam](https://hex.pm/packages/duskmoon_quickbeam/${VERSION})
          - [Hex.pm: duskmoon_bundler](https://hex.pm/packages/duskmoon_bundler/${VERSION})
          - [Hex.pm: phoenix_duskmoon](https://hex.pm/packages/phoenix_duskmoon/${VERSION})
          - [npm](https://www.npmjs.com/package/phoenix_duskmoon/v/${VERSION})
          - GitHub Release with native prebuilt artifacts
          EOF

  trigger-docker:
    name: Trigger Docker Build
    runs-on: ubuntu-latest
    needs: [ publish ]

    steps:
      - name: Trigger Docker workflow
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker.yml',
              ref: 'main',
              inputs: {
                'git-ref': 'v${{ inputs.version }}',
                'version': '${{ inputs.version }}'
              }
            });
            console.log('Docker build workflow triggered for v${{ inputs.version }}');
