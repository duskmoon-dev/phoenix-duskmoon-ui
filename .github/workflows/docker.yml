name: Docker

on:
  workflow_dispatch:
    inputs:
      git-ref:
        description: 'Git revision to build (branch, tag, or commit)'
        required: true
        default: 'main'
        type: string
      version:
        description: 'Image version tag (e.g., 9.0.0).'
        required: true
        default: "9.0.0"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-demo:
    name: Build Demo Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git-ref }}

      - name: Determine version tag
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.inputs.git-ref }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push to DockerHub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          pull: true
          push: true
          build-args: |
            RELEASE_VERSION=${{ steps.version.outputs.version }}
          tags: |
            docker.io/gsmlg/duskmoon-storybook:${{ steps.version.outputs.version }}
            docker.io/gsmlg/duskmoon-storybook:latest
            ghcr.io/duskmoon-dev/duskmoon-storybook:${{ steps.version.outputs.version }}
            ghcr.io/duskmoon-dev/duskmoon-storybook:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
