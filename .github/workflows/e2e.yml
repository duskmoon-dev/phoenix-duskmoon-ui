name: E2E

on:
  workflow_dispatch:
    inputs:
      package_source:
        description: 'Package source to test'
        required: true
        type: choice
        default: source
        options:
          - source
          - hex
      version:
        description: 'Released version to test when package_source=hex (e.g., 9.5.4)'
        required: false
        type: string
      git_ref:
        description: 'Git revision to test when package_source=source'
        required: false
        default: main
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-install:
    name: Package Install (${{ inputs.package_source }})
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout source packages
        if: inputs.package_source == 'source'
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '28'

      - name: Install Rust toolchain
        if: inputs.package_source == 'source'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Zig
        if: inputs.package_source == 'source'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.1

      - name: Create package install project
        working-directory: ${{ runner.temp }}
        run: mix new duskmoon_package_e2e --sup

      - name: Prepare source package manifests
        if: inputs.package_source == 'source'
        run: |
          set -euo pipefail

          SOURCE_APP_ROOT="${RUNNER_TEMP}/source_apps"
          mkdir -p "$SOURCE_APP_ROOT"

          for app in \
            duskmoon_hex_solver \
            duskmoon_npm \
            duskmoon_oxc \
            duskmoon_vize \
            duskmoon_oxide \
            duskmoon_quickbeam \
            duskmoon_bundler_runtime \
            duskmoon_bundler \
            phoenix_duskmoon
          do
            cp -R "apps/${app}" "${SOURCE_APP_ROOT}/${app}"
          done

          strip_umbrella_paths() {
            sed -i '/^[[:space:]]*build_path: /d;/^[[:space:]]*config_path: /d;/^[[:space:]]*deps_path: /d;/^[[:space:]]*lockfile: /d' "$1"
          }

          for mix_file in \
            "${SOURCE_APP_ROOT}/duskmoon_hex_solver/mix.exs" \
            "${SOURCE_APP_ROOT}/duskmoon_npm/mix.exs" \
            "${SOURCE_APP_ROOT}/duskmoon_oxc/mix.exs" \
            "${SOURCE_APP_ROOT}/duskmoon_vize/mix.exs" \
            "${SOURCE_APP_ROOT}/duskmoon_oxide/mix.exs" \
            "${SOURCE_APP_ROOT}/duskmoon_quickbeam/mix.exs" \
            "${SOURCE_APP_ROOT}/duskmoon_bundler_runtime/mix.exs" \
            "${SOURCE_APP_ROOT}/duskmoon_bundler/mix.exs" \
            "${SOURCE_APP_ROOT}/phoenix_duskmoon/mix.exs"
          do
            strip_umbrella_paths "$mix_file"
          done

          sed -i 's%{:duskmoon_hex_solver, in_umbrella: true}%{:duskmoon_hex_solver, path: "../duskmoon_hex_solver"}%' "${SOURCE_APP_ROOT}/duskmoon_npm/mix.exs"
          sed -i 's%{:duskmoon_oxc, in_umbrella: true}%{:duskmoon_oxc, path: "../duskmoon_oxc"}%' "${SOURCE_APP_ROOT}/duskmoon_quickbeam/mix.exs"
          sed -i 's%{:duskmoon_npm, in_umbrella: true}%{:duskmoon_npm, path: "../duskmoon_npm"}%' "${SOURCE_APP_ROOT}/duskmoon_quickbeam/mix.exs"
          sed -i 's%{:duskmoon_oxc, in_umbrella: true}%{:duskmoon_oxc, path: "../duskmoon_oxc"}%' "${SOURCE_APP_ROOT}/duskmoon_bundler/mix.exs"
          sed -i 's%{:duskmoon_vize, in_umbrella: true}%{:duskmoon_vize, path: "../duskmoon_vize"}%' "${SOURCE_APP_ROOT}/duskmoon_bundler/mix.exs"
          sed -i 's%{:duskmoon_oxide, in_umbrella: true}%{:duskmoon_oxide, path: "../duskmoon_oxide"}%' "${SOURCE_APP_ROOT}/duskmoon_bundler/mix.exs"
          sed -i 's%{:duskmoon_quickbeam, in_umbrella: true}%{:duskmoon_quickbeam, path: "../duskmoon_quickbeam"}%' "${SOURCE_APP_ROOT}/duskmoon_bundler/mix.exs"
          sed -i 's%{:duskmoon_bundler_runtime, in_umbrella: true}%{:duskmoon_bundler_runtime, path: "../duskmoon_bundler_runtime"}%' "${SOURCE_APP_ROOT}/duskmoon_bundler/mix.exs"
          sed -i 's%{:duskmoon_npm, in_umbrella: true}%{:duskmoon_npm, path: "../duskmoon_npm"}%' "${SOURCE_APP_ROOT}/duskmoon_bundler/mix.exs"
          sed -i 's%{:duskmoon_bundler_runtime, in_umbrella: true}%{:duskmoon_bundler_runtime, path: "../duskmoon_bundler_runtime"}%' "${SOURCE_APP_ROOT}/phoenix_duskmoon/mix.exs"
          sed -i 's%{:duskmoon_bundler, in_umbrella: true, runtime: Mix.env() == :dev}%{:duskmoon_bundler, path: "../duskmoon_bundler", runtime: Mix.env() == :dev}%' "${SOURCE_APP_ROOT}/phoenix_duskmoon/mix.exs"

      - name: Add package dependencies
        working-directory: ${{ runner.temp }}/duskmoon_package_e2e
        run: |
          set -euo pipefail

          if [ "${{ inputs.package_source }}" = "hex" ]; then
            VERSION="${{ inputs.version }}"
            if [ -z "$VERSION" ]; then
              echo "::error::version input is required when package_source=hex"
              exit 1
            fi

            DEPS_BLOCK="$(cat <<EOF
          defp deps do
            [
              {:duskmoon_hex_solver, "~> ${VERSION}"},
              {:duskmoon_npm, "~> ${VERSION}"},
              {:duskmoon_oxc, "~> ${VERSION}"},
              {:duskmoon_vize, "~> ${VERSION}"},
              {:duskmoon_oxide, "~> ${VERSION}"},
              {:duskmoon_quickbeam, "~> ${VERSION}"},
              {:duskmoon_bundler_runtime, "~> ${VERSION}"},
              {:duskmoon_bundler, "~> ${VERSION}", runtime: Mix.env() == :dev},
              {:phoenix_duskmoon, "~> ${VERSION}"}
            ]
          end
          EOF
          )"
          else
            APP_ROOT="${RUNNER_TEMP}/source_apps"
            DEPS_BLOCK="$(cat <<EOF
          defp deps do
            [
              {:duskmoon_hex_solver, path: "${APP_ROOT}/duskmoon_hex_solver"},
              {:duskmoon_npm, path: "${APP_ROOT}/duskmoon_npm"},
              {:duskmoon_oxc, path: "${APP_ROOT}/duskmoon_oxc"},
              {:duskmoon_vize, path: "${APP_ROOT}/duskmoon_vize"},
              {:duskmoon_oxide, path: "${APP_ROOT}/duskmoon_oxide"},
              {:duskmoon_quickbeam, path: "${APP_ROOT}/duskmoon_quickbeam"},
              {:duskmoon_bundler_runtime, path: "${APP_ROOT}/duskmoon_bundler_runtime"},
              {:duskmoon_bundler, path: "${APP_ROOT}/duskmoon_bundler", runtime: Mix.env() == :dev},
              {:phoenix_duskmoon, path: "${APP_ROOT}/phoenix_duskmoon"}
            ]
          end
          EOF
          )"
          fi

          export DEPS_BLOCK
          perl -0pi -e 's/defp deps do\n    \[\n.*?    \]\n  end/$ENV{DEPS_BLOCK}/s' mix.exs

      - name: Install dependencies
        working-directory: ${{ runner.temp }}/duskmoon_package_e2e
        env:
          DUSKMOON_BUILD_NATIVE_FROM_SOURCE: ${{ inputs.package_source == 'source' && '1' || '0' }}
        run: mix deps.get

      - name: Compile package graph
        working-directory: ${{ runner.temp }}/duskmoon_package_e2e
        env:
          DUSKMOON_BUILD_NATIVE_FROM_SOURCE: ${{ inputs.package_source == 'source' && '1' || '0' }}
        run: mix compile --warnings-as-errors

      - name: Add package smoke tests
        working-directory: ${{ runner.temp }}/duskmoon_package_e2e
        run: |
          cat > test/duskmoon_packages_test.exs <<'EOF'
          defmodule DuskmoonPackagesTest do
            use ExUnit.Case, async: true

            test "Duskmoon Hex packages load together" do
              assert Code.ensure_loaded?(HexSolver)
              assert Code.ensure_loaded?(NPM)
              assert Code.ensure_loaded?(OXC)
              assert Code.ensure_loaded?(Vize)
              assert Code.ensure_loaded?(Oxide)
              assert Code.ensure_loaded?(QuickBEAM)
              assert Code.ensure_loaded?(DuskmoonBundler)
              assert Code.ensure_loaded?(DuskmoonBundlerRuntime)
              assert Code.ensure_loaded?(PhoenixDuskmoon)
            end

            test "duskmoon_npm resolves an empty dependency set" do
              assert {:ok, %{}} = NPM.Resolver.resolve(%{})
            end
          end
          EOF

      - name: Run package smoke tests
        working-directory: ${{ runner.temp }}/duskmoon_package_e2e
        env:
          DUSKMOON_BUILD_NATIVE_FROM_SOURCE: ${{ inputs.package_source == 'source' && '1' || '0' }}
          MIX_ENV: test
        run: mix test
